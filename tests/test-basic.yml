name: Test basic usage with github_token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_token: fake-token-for-noop
          root_options: "-v --noop"
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (noop mode)"
          echo "PASS"
