name: Test basic usage with github_token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: "fake-token-for-testing"
          root_options: "-v"
          directory: "."
      - name: Assert action was invoked
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with a fake token (no real release),
          # but it must have been invoked (not skipped). Acceptable outcomes are
          # 'success' or 'failure' — never 'skipped'.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to be invoked"
            exit 1
          fi
          echo "PASS: action was invoked (outcome: ${{ steps.action.outcome }})"
