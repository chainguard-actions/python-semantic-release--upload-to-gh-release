name: Test basic usage with github_token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_token: fake-token-for-testing
          root_options: "--noop -v"
        continue-on-error: true
      - name: Assert action was invoked
        run: |
          echo "Action completed (may have failed due to fake token, which is expected)"
          echo "PASS: action was invoked with github_token input"
