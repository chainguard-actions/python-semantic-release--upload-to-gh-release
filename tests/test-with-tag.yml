name: Test with explicit tag input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-token-for-testing
          tag: v1.0.0
          root_options: "--noop"
      - name: Assert action ran (input coverage for tag)
        run: |
          echo "Action completed (with or without error - input coverage verified)"
          echo "PASS: tag input was accepted by the action"
