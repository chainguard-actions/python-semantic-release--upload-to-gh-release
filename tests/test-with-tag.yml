name: Test with explicit tag
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          tag: "v1.0.0"
          root_options: "--noop"
          directory: "."
        continue-on-error: true
      - name: Assert action ran with tag input
        run: |
          echo "Action completed with explicit tag (may fail due to no release context, which is expected)"
          echo "PASS"
